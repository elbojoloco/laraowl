services:
  redis:
    image: redis:7-alpine
    platform: linux/arm64
    command: sh -c 'redis-server --appendonly yes --requirepass "$${REDIS_PASSWORD}"'
    volumes: !override
      - redis-data:/data
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$${REDIS_PASSWORD}\" ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 5

  caddy:
    volumes: !override
      - ./docker/Caddyfile.local:/etc/caddy/Caddyfile
      - storage:/usr/share/caddy/html/storage:rw
      - public:/usr/share/caddy/html/public:ro
      - caddy_data:/data
      - caddy_config:/config
    ports: !override
      - "18080:80"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--spider", "http://localhost/"]
      interval: 10s
      timeout: 5s
      retries: 3
